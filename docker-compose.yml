services:
  postgres:
    image: postgres:16
    container_name: gma-postgres
    environment:
      POSTGRES_USER: gma
      POSTGRES_PASSWORD: gma
      POSTGRES_DB: gma
    ports:
      - "5432:5432"
    volumes:
      - gma-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gma -d gma"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gma-postgres-data:
